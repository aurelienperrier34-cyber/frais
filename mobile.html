<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tester Frais sur mobile</title>
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f6ef;color:#17332d;font-family:system-ui,sans-serif}.card{max-width:360px;padding:28px;text-align:center;background:#fffefa;border:1px solid #dce2d7;border-radius:22px;box-shadow:0 12px 30px #17332d18}h1{margin:0 0 8px}p{line-height:1.5;color:#60736b}#qrcode{display:grid;place-items:center;margin:22px auto}a{color:#1d664b;font-weight:700}</style>
</head>
<body>
  <main class="card"><h1>Frais sur mobile</h1><p>Scanne ce code avec l’appareil photo de ton téléphone, connecté au même Wi‑Fi.</p><div id="qrcode"></div><a href="http://192.168.1.112:8010/refresh.html">Ouvrir le lien mobile</a></main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>new QRCode(document.querySelector('#qrcode'),{text:'http://192.168.1.112:8010/refresh.html',width:240,height:240,colorDark:'#17332d',colorLight:'#fffefa',correctLevel:QRCode.CorrectLevel.M});</script>
</body>
</html>
